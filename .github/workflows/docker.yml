name: Build and Push Docker Image

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: nextcrm-app

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          existing=$(
            git ls-remote --tags origin \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | awk '/^v0\.[0-9]+$/ { sub(/^v/, ""); print }' \
              | sort -V \
              | tail -n 1
          )

          echo "Latest version found: ${existing:-none}"

          if [[ -z "$existing" ]]; then
            next_minor=1
          else
            major="${existing%%.*}"
            minor="${existing##*.}"

            if [[ "$major" != "0" ]]; then
              echo "::error::Unexpected major version '$major', aborting."
              exit 1
            fi

            next_minor=$((10#$minor + 1))
          fi

          next_version="0.${next_minor}"

          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "Resolved next version: $next_version"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=raw,value=${{ steps.version.outputs.next_version }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push version tag
        run: |
          git tag "v${{ steps.version.outputs.next_version }}" \
            "${{ github.sha }}"
          git push origin "v${{ steps.version.outputs.next_version }}"
