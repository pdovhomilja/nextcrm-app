name: Unit Tests

on:
  pull_request:
    paths:
      - "actions/**"
      - "lib/**"
      - "tests/units/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.js"
      - "prisma/schema.prisma"
  push:
    branches: ["dev", "main", "dev-*"]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      NODE_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm dotenv -e .env.test -- pnpm prisma generate

      - run: pnpm dotenv -e .env.test -- pnpm run test:unit --coverage

      - name: Report Coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          file-coverage-mode: all
