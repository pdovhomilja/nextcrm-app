name: Tests

on:
  pull_request:
    paths:
      - "actions/**"
      - "app/**"
      - "lib/**"
      - "prisma/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest*.config.js"
      - "env.*.setup.ts"
      - "proxy.ts"
  push:
    branches: ["dev", "main", "dev-*"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    uses: ./.github/workflows/unit-tests.yml

  integration:
    uses: ./.github/workflows/integration-tests.yml
