name: Tests

on:
  pull_request:
    paths:
      - "actions/**"
      - "app/**"
      - "lib/**"
      - "prisma/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest*.config.js"
      - "env.*.setup.ts"
      - "proxy.ts"
  push:
    branches: ["dev", "main"]
  workflow_dispatch:

# Aggregate gate. Runs unit + integration in parallel. Both must succeed for
# the PR to be mergeable. Replaces the implicit "unit tests only" gate that
# existed before integration coverage was added.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit
    uses: ./.github/workflows/unit-tests.yml
    with: {}
    permissions:
      contents: read
      pull-requests: write

  integration:
    name: Integration
    uses: ./.github/workflows/integration-tests.yml
    with: {}
    permissions:
      contents: read
      pull-requests: write
