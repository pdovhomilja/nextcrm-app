name: Integration Tests

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      INTEGRATION_USE_HTTP_AUTH: "true"

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: nextcrm
          POSTGRES_PASSWORD: nextcrm_dev
          POSTGRES_DB: nextcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nextcrm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: nextcrm
          MINIO_ROOT_PASSWORD: minio_dev_password
        ports:
          - 9000:9000
          - 9001:9001
        command: server /data --console-address ":9001"
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      inngest:
        image: inngest/inngest:latest
        ports:
          - 8288:8288
        command: inngest dev -u http://localhost:3000/api/inngest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm dotenv -e .env.integration -- pnpm prisma generate

      - name: Apply Prisma migrations
        run: pnpm dotenv -e .env.integration -- pnpm prisma migrate deploy

      - name: Seed test admin
        run: pnpm dotenv -e .env.integration -- pnpm prisma db seed

      - name: Build Next app
        run: pnpm dotenv -e .env.integration -- pnpm run build

      - name: Start Next.js server
        run: |
          pnpm dotenv -e .env.integration -- pnpm start &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/auth/get-session >/dev/null 2>&1; then
              echo "Next.js ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Next.js failed to start in 30s"
          exit 1

      - name: Run integration tests
        run: pnpm dotenv -e .env.integration -- pnpm run test:integration --reporter=json --outputFile=results.json
        continue-on-error: true

      - name: Generate integration tests report
        if: always()
        run: node scripts/generate-integration-report.js

      - name: Publish integration tests report to summary
        if: always()
        run: |
          if [ -f integration-report.md ]; then
            cat integration-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Vitest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-vitest-report
          path: |
            results.json
            integration-report.md
          if-no-files-found: ignore
          retention-days: 7
